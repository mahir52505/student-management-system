<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Update Student</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container mt-5">
	<div class="card">
		<div class="card-header bg-warning text-dark">
			<h3><i class="fas fa-edit"></i> Update Student</h3>
		</div>
		<div class="card-body">
			<form th:action="@{/saveStudent}" th:object="${student}" method="post">
				<input type="hidden" th:field="*{id}">

				<div class="row">
					<div class="col-md-6 mb-3">
						<label class="form-label">First Name:</label>
						<input type="text" th:field="*{firstName}" class="form-control" required>
						<div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
					</div>

					<div class="col-md-6 mb-3">
						<label class="form-label">Last Name:</label>
						<input type="text" th:field="*{lastName}" class="form-control" required>
						<div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
					</div>

					<div class="col-md-6 mb-3">
						<label class="form-label">Email:</label>
						<input type="email" th:field="*{email}" class="form-control" required>
						<div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
					</div>

					<div class="col-md-6 mb-3">
						<label class="form-label">Phone (10 digits only):</label>
						<input type="tel" th:field="*{phone}" class="form-control"
						       pattern="\d{10}"
						       maxlength="10"
						       minlength="10"
						       title="Please enter exactly 10 digits"
						       oninput="this.value = this.value.replace(/[^0-9]/g, '')">
						<small class="text-muted">Enter exactly 10 digits (numbers only)</small>
						<div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
					</div>

					<div class="col-md-12 mb-3">
						<label class="form-label">Address:</label>
						<textarea th:field="*{address}" class="form-control" rows="2"></textarea>
					</div>

					<div class="col-md-12 mb-3">
						<label class="form-label">Course:</label>
						<select th:field="*{course}" class="form-select">
							<option value="">Select Course</option>
							<option value="Computer Science">Computer Science</option>
							<option value="Mathematics">Mathematics</option>
							<option value="Physics">Physics</option>
							<option value="Chemistry">Chemistry</option>
							<option value="Biology">Biology</option>
							<option value="Engineering">Engineering</option>
						</select>
					</div>
				</div>

				<div class="mt-3">
					<button type="submit" class="btn btn-warning">
						<i class="fas fa-save"></i> Update Student
					</button>
					<a th:href="@{/}" class="btn btn-secondary">
						<i class="fas fa-times"></i> Cancel
					</a>
				</div>
			</form>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
